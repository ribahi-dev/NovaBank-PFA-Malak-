# =============================================================================
# ci.yml — Intégration Continue : lint + tests avec un vrai PostgreSQL.
#
# À chaque push/PR, GitHub exécute ce pipeline sur une machine neuve. Les
# tests d'intégration tournent contre un PostgreSQL 16 éphémère (service
# Docker), exactement comme en local — le badge vert prouve que TOUTE la
# chaîne (auth, RBAC, transactions, scoring, alertes) fonctionne.
# =============================================================================
name: CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # PostgreSQL jetable, détruit à la fin du job. Port 5433 côté hôte
    # pour refléter la convention locale du projet.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: novabank
        ports:
          - "5433:5432"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://postgres:password@localhost:5433/novabank

    steps:
      - uses: actions/checkout@v4

      # Même version que sur les machines du trinôme : la CI doit reproduire
      # l'environnement de dev, sinon "vert en CI mais cassé en local".
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Installer les dépendances
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        run: pytest -v
