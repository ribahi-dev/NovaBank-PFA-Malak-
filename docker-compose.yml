# =============================================================================
# docker-compose.yml — orchestre les services de la plateforme NovaBank.
#
# Pourquoi ce fichier existe : il décrit l'infrastructure (base de données,
# et bientôt API + frontend) de façon REPRODUCTIBLE. N'importe quel membre
# du trinôme — ou le jury — obtient le même environnement avec une seule
# commande : `docker compose up -d`.
#
# Le schéma de la base n'est PAS créé ici (pas de script init.sql monté) :
# la source de vérité du schéma est le code Python (models SQLAlchemy),
# appliqué par Alembic. La base démarre vide, le code la remplit.
# =============================================================================
services:
  postgres:
    image: postgres:16          # version majeure épinglée = pas de surprise lors d'un `pull`
    container_name: novabank_postgres
    restart: unless-stopped     # redémarre avec Docker Desktop, sauf arrêt manuel

    environment:
      POSTGRES_USER: postgres
      # Le mot de passe vient du fichier .env (non versionné) ; la valeur
      # après `:-` est un défaut de dépannage pour le dev local uniquement.
      # Règle : AUCUN secret en dur dans un fichier versionné sur GitHub.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: novabank

    ports:
      # Port HÔTE 5433 -> port CONTENEUR 5432. On ne publie pas sur 5432
      # car une installation PostgreSQL native sur la machine d'un membre
      # de l'équipe (service Windows/Linux) occuperait déjà ce port : le
      # backend se connecterait alors au MAUVAIS serveur avec une erreur
      # d'authentification incompréhensible (cas vécu sur ce projet).
      - "5433:5432"

    volumes:
      # Volume nommé : les données survivent à la destruction du conteneur.
      # Sans lui, chaque `docker compose down` effacerait toute la base.
      - postgres_data:/var/lib/postgresql/data

    # Le healthcheck permettra aux futurs services (api, frontend) d'attendre
    # que Postgres soit réellement PRÊT (depends_on: condition: service_healthy)
    # et pas seulement démarré — cause n°1 des "connection refused" au boot.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d novabank"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend            # image construite depuis backend/Dockerfile
    container_name: novabank_api
    restart: unless-stopped
    environment:
      # À l'INTÉRIEUR du réseau Docker, Postgres s'appelle "postgres"
      # (nom du service) et écoute sur son port natif 5432 — le port 5433
      # n'existe que vu depuis la machine hôte.
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/novabank
      SECRET_KEY: ${SECRET_KEY:-dev-only-change-me-in-env-2f8c1a94e7b3d6051c8f2ab47d9e0361}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy   # attend que pg_isready réponde (voir healthcheck)

volumes:
  postgres_data:
